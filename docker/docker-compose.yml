# Compose project name:
# - Keep it stable to avoid creating multiple stacks that bind the same host ports.
# - This is especially important for self-hosted runners that also act as deployment servers.
name: hookcode

services:
  backend:
    build:
      # Build context is the repo root so both `backend/` and `frontend/` workspace packages are available.
      # Change record:
      # - 2026-01-14: Move Compose file under `docker/` and switch context to `..`.
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR}
    env_file:
      # Single Docker deployment env file shared by frontend(build) + backend/worker(runtime).
      - ./.env
    environment:
      # Keep backend runtime storage on an explicit container path so named volumes persist HOOKCODE_WORK_DIR across rebuilds. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      HOOKCODE_WORK_DIR: ${HOOKCODE_WORK_DIR:-/var/lib/hookcode}
      # Default Docker deployments to the external system-worker mode so backend and compose/remote workers share the same executor protocol. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      HOOKCODE_SYSTEM_WORKER_MODE: ${HOOKCODE_SYSTEM_WORKER_MODE:-external}
    volumes:
      # Persist backend task groups and its supervised local-worker caches beneath HOOKCODE_WORK_DIR. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      - backend_work_dir:${HOOKCODE_WORK_DIR:-/var/lib/hookcode}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Optional host exposure (debugging / local access):
      # - Cloudflare proxy only forwards 80/443, so public access must go through frontend Nginx (`/api/*`).
      # - Default binds to 127.0.0.1 to avoid accidental public exposure and host port conflicts.
      - "${HOOKCODE_BACKEND_BIND:-127.0.0.1}:${HOOKCODE_BACKEND_PORT:-4000}:4000"
    depends_on:
      - db
    # Add backend healthcheck so CI can verify startup readiness. docs/en/developer/plans/ci-backend-start-20260310/task_plan.md ci-backend-start-20260310
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    # Run the standalone worker image separately from backend so deployments can place executors on arbitrary machines. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
    build:
      context: ..
      dockerfile: worker/Dockerfile
      args:
        PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR}
    env_file:
      - ./.env
    environment:
      # Keep standalone worker runtime storage on the configured container path so runtime installs and sticky workspaces survive restarts. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      HOOKCODE_WORK_DIR: ${HOOKCODE_WORK_DIR:-/var/lib/hookcode}
      # Point the bundled Docker worker at backend using the same bootstrap credentials that backend registers as the default external system worker. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      HOOKCODE_BACKEND_URL: ${HOOKCODE_DOCKER_WORKER_BACKEND_URL:-http://backend:4000/api}
      HOOKCODE_WORKER_ID: ${HOOKCODE_SYSTEM_WORKER_ID}
      HOOKCODE_WORKER_TOKEN: ${HOOKCODE_SYSTEM_WORKER_TOKEN}
      HOOKCODE_WORKER_NAME: ${HOOKCODE_SYSTEM_WORKER_NAME:-Docker Default Worker}
      HOOKCODE_WORKER_KIND: remote
      HOOKCODE_WORKER_PREVIEW: ${HOOKCODE_WORKER_PREVIEW:-0}
      HOOKCODE_WORKER_MAX_CONCURRENCY: ${HOOKCODE_SYSTEM_WORKER_MAX_CONCURRENCY:-1}
    volumes:
      # Persist standalone worker runtime installs and sticky workspaces beneath HOOKCODE_WORK_DIR. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
      - worker_work_dir:${HOOKCODE_WORK_DIR:-/var/lib/hookcode}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run the built worker image entrypoint from /app so Docker deployments start the packaged standalone executor correctly. docs/en/developer/plans/worker-executor-refactor-20260307/task_plan.md worker-executor-refactor-20260307
    command: ["node", "/app/dist/main.js"]
    depends_on:
      - db
      - backend

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        # VITE_API_BASE_URL now uses relative path to leverage Nginx reverse proxy
        # This allows API requests to go through the same port (80) as the frontend
        # Solving the Cloudflare port restriction issue (only port 80/443 allowed)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        # Feature toggle (2026-01-15): disable account display-name/password editing in CI/staging builds.
        VITE_DISABLE_ACCOUNT_EDIT: ${VITE_DISABLE_ACCOUNT_EDIT:-false}
    ports:
      - "${HOOKCODE_FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      # DB_* is used by backend/worker; reuse it for the Postgres container to keep a single env file.
      POSTGRES_DB: ${DB_NAME:-hookcode}
      POSTGRES_USER: ${DB_USER:-hookcode}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hookcode}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${HOOKCODE_DB_PORT:-5432}:5432"

volumes:
  db_data: {}
  backend_work_dir: {}
  worker_work_dir: {}
